# Per-site dev stack — two containers, both fronted by the shared edge Caddy:
#   - `app`: vite dev server (HMR), bind-mounts the site dir
#   - `mcp`: HTTPS MCP server, exposes the Bash tool to remote Claude clients
#           (bearer-token auth, scoped to this site's container)

services:
  app:
    build:
      context: ./${REPO_NAME}
      args:
        DEV_UID: ${DEV_UID}
    container_name: ${SLUG}
    hostname: ${SLUG}
    # No working_dir: Docker would otherwise auto-create /home/dev/app as a
    # root-owned empty dir on the bind-mount, shadowing the symlink that
    # start.sh creates. start.sh cd's into /home/dev/app itself.
    volumes:
      # Site dir → /home/dev. The /home/dev/app symlink is created at first
      # start by start.sh (it points to the cloned repo subdir).
      - .:/home/dev:rw
    expose:
      - "5173"
    environment:
      NODE_ENV: development
      REPO_NAME: ${REPO_NAME}
    networks:
      - edge
    labels:
      caddy: ${DOMAIN}
      caddy.reverse_proxy: "{{upstreams 5173}}"
    restart: unless-stopped

  mcp:
    image: dev-mcp:latest    # built by install.sh from dev-infra/mcp-server/
    container_name: ${SLUG}-mcp
    environment:
      MCP_TOKEN: ${MCP_TOKEN}
      MCP_SITE: ${SLUG}
      MCP_LABEL: dev-shell-${SLUG}
    volumes:
      # Talks to host docker to exec into the `app` container above.
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - edge
    labels:
      caddy: ${MCP_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 3000}}"
    depends_on:
      - app
    restart: unless-stopped

networks:
  edge:
    external: true
    name: edge
